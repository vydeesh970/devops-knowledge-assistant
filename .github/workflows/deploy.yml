# .github/workflows/deploy.yml
#
# CI/CD Pipeline - runs automatically when you push to main branch
#
# WHAT THIS DOES:
# 1. Runs tests to make sure nothing is broken
# 2. Builds a fresh Docker image
# 3. Pushes the image to AWS ECR
# 4. Deploys the new image to AWS ECS
# All automatically - no manual steps needed

name: Deploy to AWS

on:
  push:
    branches: [ main ]  # Runs on every push to main
  pull_request:
    branches: [ main ]  # Also runs on pull requests (tests only)

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-knowledge-assistant
  ECS_SERVICE: devops-knowledge-assistant-service
  ECS_CLUSTER: devops-knowledge-assistant-cluster
  CONTAINER_NAME: devops-knowledge-assistant

jobs:
  # ============================================================
  # JOB 1: TEST
  # Runs our tests to make sure code works before deploying
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: true  # Don't fail if no tests yet

  # ============================================================
  # JOB 2: DEPLOY
  # Only runs on push to main (not pull requests)
  # ============================================================
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build the Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Also tag as latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment complete
        run: echo "✅ Deployment successful!"